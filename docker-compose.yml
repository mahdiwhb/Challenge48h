services:
  # ── Backend (FastAPI) ─────────────────────────
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: parkshare-backend
    env_file: .env
    volumes:
      - db-data:/app/app/backend/data
      - ./data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx (Reverse Proxy + Frontend) ──────────
  nginx:
    build:
      context: .
      dockerfile: infra/Dockerfile.nginx
    container_name: parkshare-nginx
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
